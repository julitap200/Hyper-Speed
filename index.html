    <script>

            theme: {
                extend: {
                    colors: {
                        brand: {

    <style>
        body {

            background-color: #020617; 
        }
        
        .car-card {
            transition: all 0.3s ease;
            background-color: #1e293b;
            color: #f1f5f9;
            cursor: pointer;
            overflow: hidden;
            border: 1px solid #334155;
        }
        
        .car-card:hover {
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transform: translateY(-5px);
            border-color: #3b82f6;
        }

        .gradient-bg {
            background: linear-gradient(to bottom, #0F172A, #020617);
        }
    </style>

        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <a href="#" onclick="resetSearch()" class="flex items-center gap-3 text-white font-bold text-2xl tracking-tight">

                <span>Hyper Speed</span>
            </a>
            
            <div class="relative w-full max-w-xs">
                <input type="text" id="search-input" onkeyup="filterCars()" placeholder="Buscar por ID o nombre..." class="w-full bg-gray-900 border border-gray-700 rounded-full py-2 pl-10 pr-4 text-sm focus:outline-none focus:border-blue-500 transition-all">
                <i class="ph ph-magnifying-glass absolute left-3 top-2.5 text-gray-500"></i>
            </div>
        </div>
    </header>

    </main>

            <i class="ph ph-x text-4xl"></i>

        const carsGrid = document.getElementById('cars-grid');
        const modal = document.getElementById('full-screen-modal');
        const modalContent = document.getElementById('modal-content');

        const handleImageError = (img) => {
            img.onerror = null; 
            img.src = 'https://placehold.co/600x400/1e293b/ffffff?text=Imagen+No+Disponible';
        };

        function createCarCard(car) {
            return `
                <article onclick="openModal('${car.id}')" class="car-card rounded-xl shadow-lg flex flex-col border border-gray-700">
                    <div class="w-full h-48 bg-gray-800 overflow-hidden">
                        <img src="${car.image}" alt="${car.name}" onerror="handleImageError(this)" class="w-full h-full object-cover">
                    </div>
                    <div class="p-6">
                        <div class="text-xs text-blue-400 font-mono mb-1">ID: #${car.id}</div>
                        <h3 class="text-xl font-bold text-white mb-2 leading-tight">${car.name}</h3>
                        <div class="text-sm text-gray-400 font-medium">${car.year}</div>
                    </div>
                </article>
            `;
        }

        function render(data) {
            carsGrid.innerHTML = data.map(createCarCard).join('');
        }

        function filterCars() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = carsData.filter(car => 
                car.name.toLowerCase().includes(query) || 
                car.id.toLowerCase().includes(query)
            );
            render(filtered);
        }

        function resetSearch() {
            document.getElementById('search-input').value = '';
            render(carsData);
        }

        function openModal(id) {
            const car = carsData.find(c => c.id === id);
            if (!car) return;
            
            modalContent.innerHTML = `
                <div class="w-full h-80 bg-gray-800 rounded-2xl mb-8 flex items-center justify-center overflow-hidden shadow-2xl">
                    <img src="${car.image}" alt="${car.name}" onerror="handleImageError(this)" class="w-full h-full object-cover">
                </div>
                <h1 class="text-4xl font-bold text-white mb-2">${car.name}</h1>
                <p class="text-2xl text-blue-400 font-mono mb-4">ID: #${car.id}</p>
                <div class="text-xl text-gray-400">Año: ${car.year}</div>
            `;
            modal.classList.remove('hidden');
        }

        function closeModal() {
            modal.classList.add('hidden');
        }

        render(carsData);
